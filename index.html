<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutual Fund Portfolio Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Mutual Fund Calculator</h1>

    <label for="fundSelect">Select Fund:</label>
    <select id="fundSelect">
      <option>Loading funds...</option>
    </select>

    <label for="units">Enter Units:</label>
    <input type="number" id="units" placeholder="Enter units" min="0" step="any">

    <button id="calcBtn" type="button" disabled>Calculate</button>

    <h2 id="result" aria-live="polite"></h2>
  </main>

  <script src="script.js"></script>
</body>
</html>
